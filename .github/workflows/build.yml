name: Java CI with Maven

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  backend_build:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      #    - name: Build with Maven
      #      run: mvn -B package --file pom.xml

      - name: Build
        run: mvn clean test -Dspring.profiles.active=ci

      # Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci
        working-directory: atelier-frontend

      - name: Run frontend tests
        run: npm test
        working-directory: atelier-frontend

      - name: Run frontend lint
        run: npm run lint
        working-directory: atelier-frontend

  frontend_test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: atelier-frontend
        run: npm ci

      - name: Test
        working-directory: atelier-frontend
        run: npm test

  frontend_build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: atelier-frontend
        run: npm ci

      - name: Test
        working-directory: atelier-frontend
        run: npm test

  frontend_lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: atelier-frontend
        run: npm ci

      - name: Lint
        working-directory: atelier-frontend
        run: npm run lint

      # npx prettier --write .
      - name: Frontend Format
        working-directory: atelier-frontend
        run: npx prettier --check .
